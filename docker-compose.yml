services:
  # PHP-FPM (La lógica de Laravel)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www-data
        uid: 1000
    container_name: backlog-app
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - backlog-network
    depends_on:
      - db
      - redis

  # Nginx (El servidor web)
  nginx:
    image: nginx:alpine
    container_name: backlog-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backlog-network

  # Node para Vite (Compilación de Vue/Inertia en desarrollo)
  node:
    image: node:20-alpine
    container_name: backlog-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: npm run dev
    networks:
      - backlog-network

  # MySQL
  db:
    image: mysql:8.0
    container_name: backlog-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3311:3306" 
    volumes:
      - backlog-db-data:/var/lib/mysql
    networks:
      - backlog-network

  redis:
    image: redis:alpine
    container_name: backlog-redis
    restart: always
    networks:
      - backlog-network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www-data
        uid: 1000
    container_name: backlog-worker
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - backlog-network

  # WebSockets Server (Reverb)
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www-data
        uid: 1000
    container_name: backlog-reverb
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    entrypoint: []
    depends_on:
      - db
      - redis
    # Por defecto Reverb corre en 8080.
    # Como Nginx ya tiene el 8080 del host, mapeamos a 8020 en el host.
    ports:
      - "8020:8080"
    command: php artisan reverb:start --host="0.0.0.0" --port=8080
    networks:
      - backlog-network

networks:
  backlog-network:
    driver: bridge

volumes:
  backlog-db-data:
    driver: local
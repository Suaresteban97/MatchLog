services:
  # PHP-FPM (La lógica de Laravel)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www-data
        uid: 1000
    container_name: backlog-app
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - backlog-network
    depends_on:
      - db
      - redis

  # Nginx (El servidor web)
  nginx:
    image: nginx:alpine
    container_name: backlog-nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - backlog-network

  # MySQL
  db:
    image: mysql:8.0
    container_name: backlog-db
    restart: always
    environment:
      MYSQL_DATABASE: backlog
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: homestead
      MYSQL_PASSWORD: secret
    ports:
      - "3310:3306" 
    volumes:
      - backlog-db-data:/var/lib/mysql
    networks:
      - backlog-network

  redis:
    image: redis:alpine
    container_name: backlog-redis
    restart: always
    networks:
      - backlog-network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: backlog-worker
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    # Este es el comando que lo diferencia del App
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - backlog-network

networks:
  backlog-network:
    driver: bridge

volumes:
  backlog-db-data:
    driver: local